<div class="px-6 py-10 text-cutomWhite font-clash">
  <h2 class="text-3xl font-semibold mb-6 drop-shadow-[0_0_8px_#000000]">My Timesheets</h2>

  <button (click)="onAdd()"
    class="mb-6 px-5 py-2 bg-black text-white rounded-md hover:bg-gray-800 transition shadow-md"
  >
    + Add Timesheet 
  </button>

  <table
    mat-table
    [dataSource]="timesheetEntries"
    class="w-full mat-elevation-z2 bg-white bg-opacity-10 rounded-lg overflow-hidden text-white"
  >
    <!-- Date -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef class="px-4 py-2 font-semibold bg-black bg-opacity-30">Date</th>
      <td mat-cell *matCellDef="let row" class="px-4 py-2">{{ row.date }}</td>
    </ng-container>

    <!-- Start Time -->
    <ng-container matColumnDef="startTime">
      <th mat-header-cell *matHeaderCellDef class="px-4 py-2 font-semibold bg-black bg-opacity-30">Start Time</th>
      <td mat-cell *matCellDef="let row" class="px-4 py-2">{{ row.startTime }}</td>
    </ng-container>

    <!-- End Time -->
    <ng-container matColumnDef="endTime">
      <th mat-header-cell *matHeaderCellDef class="px-4 py-2 font-semibold bg-black bg-opacity-30">End Time</th>
      <td mat-cell *matCellDef="let row" class="px-4 py-2">{{ row.endTime }}</td>
    </ng-container>

    <!-- Break -->
    <ng-container matColumnDef="breakDuration">
      <th mat-header-cell *matHeaderCellDef class="px-4 py-2 font-semibold bg-black bg-opacity-30">Break</th>
      <td mat-cell *matCellDef="let row" class="px-4 py-2">{{ row.breakDuration }}</td>
    </ng-container>

    <!-- Worked Time -->
    <ng-container matColumnDef="workedTime">
      <th mat-header-cell *matHeaderCellDef class="px-4 py-2 font-semibold bg-black bg-opacity-30">Worked</th>
      <td mat-cell *matCellDef="let row" class="px-4 py-2">{{ getWorkedTime(row) }}</td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef class="px-4 py-2 font-semibold bg-black bg-opacity-30">Status</th>
      <td mat-cell *matCellDef="let row" class="px-4 py-2">{{ row.status }}</td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="px-4 py-2 font-semibold bg-black bg-opacity-30">Actions</th>
      <td mat-cell *matCellDef="let row" class="px-4 py-2 space-x-2">
        <button mat-icon-button color="primary" (click)="onEdit(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDelete(row.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>

  @if (timesheetEntries.length === 0) {
    <p class="text-gray-300 mt-4 italic">No timesheets available.</p>
  }
</div>
