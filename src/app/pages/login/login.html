<div class=" flex justify-center px-4 py-12">

    <div class="bg-black bg-opacity-20 text-white rounded-xl shadow-lg max-w-md w-full p-8 space-y-6">
        <h2 class="text-3xl font-clash font-semibold text-center ">
            Sign in to TimeTracker
        </h2>

        <form class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-200 mb-1">Email</label>
                <input type="email" id="email"
                    class="w-full px-4 py-2 rounded-md bg-gray-900 border border-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-rose-200" />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-200 mb-1">Password</label>
                <input type="password" id="password"
                    class="w-full px-4 py-2 rounded-md bg-gray-900 border border-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-rose-200" />
            </div>

            <button type="submit"
                class="w-full bg-white text-black font-semibold py-2 rounded-md shadow-md transform hover:scale-105 transition duration-300 ease-in-out">
                Log In
            </button>

        </form>

    </div>
</div>
